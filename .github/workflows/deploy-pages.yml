name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site with injected key
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          if [ -z "$GEMINI_KEY" ]; then
            echo "GEMINI_KEY secret is not set."
            exit 1
          fi
          mkdir -p dist
          python - <<'PY'
          from pathlib import Path
          import os
          source = Path("index.html").read_text(encoding="utf-8")
          key = os.environ.get("GEMINI_KEY", "")
          if not key:
              raise SystemExit("GEMINI_KEY secret is not set.")
          built = source.replace("__GEMINI_KEY__", key)
          if "__GEMINI_KEY__" in built:
              raise SystemExit("Placeholder replacement failed.")
          Path("dist/index.html").write_text(built, encoding="utf-8")
          print("Build artifact created with injected key placeholder replacement.")
          PY

      - name: Validate build artifact
        run: |
          if grep -q "__GEMINI_KEY__" dist/index.html; then
            echo "Placeholder still present in dist/index.html"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
