name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site with injected key
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          if [ -z "$GEMINI_KEY" ]; then
            echo "GEMINI_KEY secret is not set."
            exit 1
          fi
          mkdir -p dist
          python - <<'PY'
          from pathlib import Path
          import os
          key = os.environ.get("GEMINI_KEY", "")
          if not key:
              raise SystemExit("GEMINI_KEY secret is not set.")
          for src, dst in [("index.html", "dist/index.html"), ("v2.html", "dist/v2.html")]:
              source = Path(src).read_text(encoding="utf-8")
              built = source.replace("__GEMINI_KEY_PLACEHOLDER__", key)
              if "__GEMINI_KEY_PLACEHOLDER__" in built:
                  raise SystemExit(f"Placeholder replacement failed in {src}.")
              Path(dst).write_text(built, encoding="utf-8")
              print(f"Wrote {dst} with injected key.")
          PY

      - name: Validate build artifact
        run: |
          for f in dist/index.html dist/v2.html; do
            if grep -q "__GEMINI_KEY_PLACEHOLDER__" "$f"; then
              echo "Placeholder still present in $f"
              exit 1
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
